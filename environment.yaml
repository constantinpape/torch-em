channels:
    - conda-forge
name:
    torch-em-dev
dependencies:
    - bioimageio.spec
    - bioimageio.core >=0.8.0
    - imagecodecs
    - natsort
    # nifty and python-elf are only needed until python-elf is migrated to bioimage-cpp.
    - nifty >=1.2.3
    - python-elf
    - pytorch
    - tensorboard
    - tifffile >=2024
    - torchvision
    - tqdm
    - kornia
    - requests
    - pip
    - pip:
        # bioimage-cpp replaces the direct vigra/nifty/affogato usage and is currently PyPI-only.
        - bioimage-cpp
